<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Affinement — Programme</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8F9FA;color:#1a1a2e;overflow:hidden}
:root{
  --bg:#F8F9FA;--white:#fff;--txt:#1a1a2e;--txt2:#555;--txt3:#999;--border:#eee;
}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg)}

/* HEADER */
#header{background:#fff;padding:20px 16px 14px;flex-shrink:0;border-bottom:1px solid var(--border)}
#header h1{font-size:22px;font-weight:800;color:var(--txt);letter-spacing:-.5px;line-height:1.1}
#header h1 span{color:#9C4A87}
#header .header-sub{display:flex;align-items:center;gap:8px;margin-top:6px}
#header .h-dot{width:5px;height:5px;border-radius:50%;background:linear-gradient(135deg,#9C4A87,#A29BFE)}
#header .h-tag{font-size:12px;font-weight:600;color:var(--txt3);letter-spacing:.1px}

/* TABS */
#tabs{display:flex;background:#fff;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:0;padding:9px 4px;font-size:11px;font-weight:700;color:var(--txt3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;text-align:center;transition:color .2s;white-space:nowrap}
.tab .tab-sub{display:block;font-size:9px;font-weight:500;margin-top:2px;color:var(--txt3)}
.tab.active{color:#9C4A87;border-bottom-color:#9C4A87}
.tab.active .tab-sub{color:#9C4A87}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom,0px)}

/* SESSION HEADER */
.session-header{padding:14px 16px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.session-badge{width:56px;height:56px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;line-height:1.1}
.session-badge .s-icon{font-size:20px}
.session-badge .s-lbl{font-size:8px;color:#fff;opacity:.9;text-transform:uppercase;letter-spacing:.3px;margin-top:2px;text-align:center;white-space:nowrap;width:100%;padding:0 4px}
.session-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:3px}
.session-meta{font-size:11px;color:var(--txt2)}
.session-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-right:4px}

/* PROGRESS */
.progress-wrap{padding:10px 16px;background:#fff;border-bottom:1px solid var(--border)}
.progress-row{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-lbl{font-size:12px;font-weight:600;color:var(--txt2)}
.progress-pct{font-size:13px;font-weight:700}
.progress-track{background:var(--border);border-radius:8px;height:7px;overflow:hidden}
.progress-fill{height:7px;border-radius:8px;transition:width .5s}

/* ROUNDS */
.round-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}
.round-lbl{font-size:12px;font-weight:700;color:var(--txt2)}
.round-btn{width:36px;height:36px;border-radius:50%;border:2px solid;font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none;transition:all .2s}
.round-rest-btn{margin-left:auto;border:none;color:#fff;font-size:12px;font-weight:700;padding:8px 12px;border-radius:20px;cursor:pointer;-webkit-appearance:none}

/* WHY BOX */
.why-box{margin:12px;background:#F2F0FF;border-radius:14px;padding:12px 14px;font-size:12px;color:var(--txt);line-height:1.65;border:1px solid #e5e0ff}
.why-title{font-size:11px;font-weight:700;color:#7c73e6;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}

/* WARMUP */
.warm-section{padding:12px 16px;background:#EEFAF7;border-bottom:1px solid #ddf2ec}
.warm-title{font-size:11px;font-weight:700;color:#4daa95;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.warm-item{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid rgba(127,205,187,.2)}
.warm-item:last-child{border:none}
.warm-item-txt{flex:1;font-size:13px;color:var(--txt);font-weight:500}
.warm-item-sub{font-size:11px;color:var(--txt3)}
.warm-badge{color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}

/* EXO CARDS */
.exo-list{padding:12px 12px 24px}
.exo-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.exo-card.open{box-shadow:0 4px 18px rgba(0,0,0,.1)}
.exo-card.done{opacity:.55}
.exo-card-header{display:flex;align-items:center;padding:13px 14px;gap:12px}
.exo-num{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.exo-num.is-done{background:linear-gradient(135deg,#7FCDBB,#A29BFE)!important;color:#fff!important}
.exo-info{flex:1;min-width:0}
.exo-name{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:3px}
.badge-row{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.exo-chevron{font-size:20px;color:var(--txt3);transition:transform .25s;line-height:1;flex-shrink:0}
.exo-card.open .exo-chevron{transform:rotate(180deg)}
.exo-detail{display:none;border-top:1px solid var(--border)}
.exo-card.open .exo-detail{display:block}
.exo-body{padding:13px 14px}
.steps-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.step{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start}
.step-num{width:22px;height:22px;min-width:22px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.step-txt{font-size:13px;color:var(--txt2);line-height:1.55}
.tip-box{background:#fff8e0;border-radius:10px;padding:10px 12px;margin:8px 0 4px;font-size:12px;color:#8a7000;line-height:1.55;border-left:3px solid #ffd93d}
.err-box{background:#fff0f0;border-radius:10px;padding:10px 12px;margin:6px 0;font-size:12px;color:#c0392b;line-height:1.55;border-left:3px solid #FF6B6B}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn-timer{margin-top:0;flex:1}
.btn-timer{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;border:none;font-size:13px;font-weight:700;padding:11px 10px;border-radius:12px;cursor:pointer;-webkit-appearance:none}
.btn-hold{background:linear-gradient(135deg,#7FCDBB,#4ECDC4);color:#fff}
.btn-rest{background:rgba(80,80,80,.08);color:#555;border:1.5px solid #e0d8e8}
.btn-done{display:flex;align-items:center;gap:8px;width:100%;background:#fff;border:1.5px solid var(--border);color:var(--txt2);font-size:13px;font-weight:600;padding:10px 16px;border-radius:12px;cursor:pointer;margin-top:8px;-webkit-appearance:none;justify-content:center}
.btn-done.is-done{border-color:#7FCDBB;color:#4daa95;background:#EEFAF7}

/* CONSEIL */
.conseil{margin:0 12px 80px;border-radius:16px;padding:13px 14px;font-size:12px;line-height:1.7;border:1px solid}
.conseil-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* REPOS DIMANCHE */
.repos-wrap{padding:16px}
.repos-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.repos-icon{font-size:36px;margin-bottom:8px}
.repos-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:6px}
.repos-txt{font-size:13px;color:var(--txt2);line-height:1.6}

/* TIMER */
#timer-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.93);z-index:100;align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(4px)}
#timer-overlay.show{display:flex}
#timer-label{font-size:14px;font-weight:700;color:#E8B4CB;margin-bottom:12px;text-align:center;padding:0 24px}
#timer-ring{position:relative;width:190px;height:190px;margin:8px 0}
#timer-ring svg{width:190px;height:190px;transform:rotate(-90deg)}
#timer-ring .ring-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:10}
#timer-ring .ring-fg{fill:none;stroke:#9C4A87;stroke-width:10;stroke-linecap:round;stroke-dasharray:534;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear}
#timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:58px;font-weight:800;color:#fff;line-height:1}
#timer-sec{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px;margin-top:4px}
#btn-stop{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:#fff;font-size:15px;font-weight:600;padding:13px 36px;border-radius:16px;cursor:pointer;-webkit-appearance:none}
</style>
</head>
<body>

<div id="header">
  <h1>Affinement · <span>Marianne</span></h1>

</div>
<div id="tabs"></div>
<div id="content"></div>
</div>
<div id="timer-overlay">

    <svg viewBox="0 0 190 190"><circle class="ring-bg" cx="95" cy="95" r="85"/><circle class="ring-fg" id="ring-fg" cx="95" cy="95" r="85"/></svg>
    <div id="timer-num">0</div>
  </div>

</div>

var SESSIONS=[

exos:[
{name:'Squats au poids du corps',reps:'12-15 rep.',rest:45,hold:0,detail:'Descendre cuisses paralleles au sol. Dos droit, poids sur les talons, genoux dans l\'axe.',steps:['Pieds largeur epaules, orteils legerement ouverts.','Descendre cuisses paralleles au sol, dos droit.','Poids sur les talons, genoux dans l\'axe.','Pousser en expirant pour remonter.'],tip:'💡 Imaginez que vous vous asseyez sur une chaise invisible.',erreur:'⚠ Les genoux ne rentrent pas vers l\'interieur.'},
{name:'Fentes alternees',reps:'8 rep./jambe',rest:45,hold:0,detail:'Grand pas en avant, genou arriere proche du sol.',steps:['Grand pas en avant.','Genou arriere proche du sol, buste droit.','Genou avant a 90 degres.','Pousser sur le talon avant pour revenir.'],tip:'💡 Buste droit, regard devant.',erreur:'⚠ Le genou avant ne depasse pas les orteils.'},
{name:'Pont fessier',reps:'15 rep.',rest:45,hold:0,detail:'Maintien 2 sec en haut avec contraction maximale.',steps:['Allonge sur le dos, genoux a 90, pieds a plat.','Pousser a travers les talons pour lever les hanches.','Contracter les fessiers — tenir 2 sec.','Descendre vertebre par vertebre.'],tip:'💡 Pour intensifier : resister avec les genoux vers l\'exterieur.',erreur:'⚠ Le mouvement vient des fessiers, pas du dos.'},
{name:'Squat bulgare (chaise)',reps:'6-8 rep./jambe',rest:60,hold:0,detail:'Pied arriere sur l\'assise. Le meilleur exercice fessiers sans materiel.',steps:['Dos tourne a la chaise, poser le pied arriere sur l\'assise.','Pied avant assez avance.','Descendre lentement, genou avant a 90.','Remonter en poussant sur le talon.'],tip:'💡 Le plus difficile et le plus efficace pour les fessiers.',erreur:'⚠ Si instabilite : tenir legerement un mur.'},

var currentTab=0,doneExos={},timerInterval=null,timerTotal=0,timerLeft=0;

function buildTabs(){
  var bar=document.getElementById('tabs');
  bar.innerHTML='';
  DAYS.forEach(function(d,i){
    var el=document.createElement('div');
    el.className='tab'+(i===0?' active':'');
    el.innerHTML=d.tab+'<span class="tab-sub">'+d.sub+'</span>';
    el.onclick=(function(idx){return function(){showTab(idx);};})(i);
    bar.appendChild(el);
  });
}

function showTab(i){
  currentTab=i;
  document.querySelectorAll('.tab').forEach(function(t,j){t.classList.toggle('active',j===i);});
  renderSession(SESSIONS[i]);
}

function makeCard(ex,i,s,dk,C){
  var done=dk[i];
  return '<div class="exo-card'+(done?' done':'')+'" id="card-'+s.id+'-'+i+'" onclick="toggleCard(\''+s.id+'\','+i+')">'
    +'<div class="exo-card-header">'
    +'<div class="exo-num'+(done?' is-done':'')+'" style="background:'+(done?'linear-gradient(135deg,#7FCDBB,#A29BFE)':C.light)+';color:'+(done?'#fff':C.badge)+'">'+(done?'&#x2713;':(i+1))+'</div>'
    +'<div class="exo-info"><div class="exo-name">'+ex.name+'</div>'
    +'<div class="badge-row">'
    +'<span class="badge" style="background:'+C.light+';color:'+C.badge+'">'+ex.reps+'</span>'
    +(ex.hold>0?'<span class="badge" style="background:#fff8e0;color:#b8860b">&#x23F1; '+ex.hold+'s</span>':'')
    +'</div></div>'
    +'<span class="exo-chevron">&#x2304;</span></div>'
    +'<div class="exo-detail"><div class="exo-body">'
    +'<div class="steps-title" style="color:'+C.bg+'">&#x1F4CB; Technique</div>'
    +ex.steps.map(function(st,n){return '<div class="step"><div class="step-num" style="background:'+C.bg+'">'+(n+1)+'</div><div class="step-txt">'+st+'</div></div>';}).join('')
    +(ex.tip?'<div class="tip-box">'+ex.tip+'</div>':'')
    +(ex.erreur?'<div class="err-box">'+ex.erreur+'</div>':'')
    +'<div class="btn-row">'
    +(ex.hold>0?'<button class="btn-timer btn-hold" onclick="event.stopPropagation();startTimer('+ex.hold+',\'&#x1F3CB; Exercice\')">&#x1F3CB; Exercice '+ex.hold+'s</button>':'')
    +(ex.rest>0?'<button class="btn-timer btn-rest" onclick="event.stopPropagation();startTimer('+ex.rest+',\'&#x23F1; Repos\')">&#x23F1; Repos '+ex.rest+'s</button>':'')
    +'</div>'
    +'<button class="btn-done'+(done?' is-done':'')+'" onclick="event.stopPropagation();markDone(\''+s.id+'\','+i+')">'+(done?'&#x21A9; Marquer non fait':'&#x2713; Exercice termin&#233;')+'</button>'
    +'</div></div></div>';
}

function renderSession(s){
  var C=COLORS[s.col];
  var dk=doneExos[s.id]||{};
  var doneCount=Object.keys(dk).filter(function(k){return k.indexOf('__')<0;}).length;
  var total=s.exos.length;
  var pct=total?Math.round(doneCount/total*100):0;
  var html='';

  html+='<div class="session-header">'
    +'<div class="session-badge" style="background:'+C.grad+'">'
    +'<span class="s-icon">'+s.icon+'</span>'
    +'<span class="s-lbl">'+s.name+'</span>'
    +'</div>'
    +'<div><div class="session-title">'+s.name+' — '+s.sub+'</div>'
    +'<div class="session-meta"><span class="session-tag" style="background:'+C.light+';color:'+C.badge+'">'+s.tag+'</span></div>'
    +'</div></div>';

  if(!s.repos){
    html+='<div class="progress-wrap">'
      +'<div class="progress-row"><span class="progress-lbl">Progression</span><span class="progress-pct" style="color:'+C.bg+'">'+pct+'%</span></div>'
      +'<div class="progress-track"><div class="progress-fill" style="background:'+C.grad+';width:'+pct+'%"></div></div>'
      +'</div>';
  }

  if(s.why){
    html+='<div class="why-box"><div class="why-title">&#x1F9EC; Pourquoi cette seance</div>'+s.why+'</div>';
  }

  if(s.warmup&&s.warmup.length>0){
    html+='<div class="warm-section"><div class="warm-title">&#x1F525; Echauffement</div>';
    s.warmup.forEach(function(w){
      html+='<div class="warm-item"><div class="warm-item-txt">'+w.n+'<br><span class="warm-item-sub">'+w.d+'</span></div>'
        +'<span class="warm-badge" style="background:'+C.bg+'">'+w.b+'</span></div>';
    });
    html+='</div>';
  }

  if(s.repos){
    html+='<div class="repos-wrap"><div class="repos-card" style="border-color:'+C.bg+'33">'
      +'<div class="repos-icon">🌸</div>'
      +'<div class="repos-title">Journee de recuperation</div>'
      +'<div class="repos-txt">Marche douce + etirements complets.</div>'
      +'</div></div>';
  }

  if(!s.repos){
    var curRound=doneExos['__round_'+s.id]||1;
    html+='<div class="round-bar">'
      +'<span class="round-lbl">Tour</span>'
      +[1,2,3].map(function(r){
        return '<button class="round-btn'+(curRound===r?' active':'')+'" '
          +'style="'+(curRound===r?'background:'+C.bg+';color:#fff;border-color:'+C.bg:'background:#fff;color:'+C.badge+';border-color:'+C.badge)+'" '
          +'onclick="setRound(\''+s.id+'\','+r+')">'+r+'</button>';
      }).join('')
      +'<button class="round-rest-btn" style="background:'+C.grad+'" onclick="startTimer(90,\'&#x23F1; Repos entre les tours\')">&#x23F1; Repos 90s</button>'
      +'</div>';
  }

  html+='<div class="exo-list">';
  s.exos.forEach(function(ex,i){html+=makeCard(ex,i,s,dk,C);});
  html+='</div>';

  html+='<div class="conseil" style="background:'+C.light+';border-color:'+C.bg+'33">'
    +'<div class="conseil-title" style="color:'+C.bg+'">&#x1F4A1; Conseil</div>'+s.conseil+'</div>';

  document.getElementById('content').innerHTML=html;
  document.getElementById('content').scrollTop=0;
}

function setRound(sid,r){
  doneExos['__round_'+sid]=r;
  renderSession(SESSIONS[currentTab]);
}

function toggleCard(sid,i){
  var card=document.getElementById('card-'+sid+'-'+i);
  var isOpen=card.classList.contains('open');
  document.querySelectorAll('.exo-card.open').forEach(function(c){c.classList.remove('open');});
  if(!isOpen)card.classList.add('open');
}

function markDone(sid,i){
  if(!doneExos[sid])doneExos[sid]={};
  if(doneExos[sid][i])delete doneExos[sid][i];
  else doneExos[sid][i]=true;
  var sc=document.getElementById('content').scrollTop;
  renderSession(SESSIONS[currentTab]);
  document.getElementById('content').scrollTop=sc;
  var card=document.getElementById('card-'+sid+'-'+i);
  if(card)card.classList.add('open');
}

function startTimer(sec,label){
  timerTotal=sec;timerLeft=sec;
  document.getElementById('timer-label').textContent=label||'Repos';
  document.getElementById('timer-overlay').classList.add('show');
  updateTimer();
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    timerLeft--;updateTimer();
    if(timerLeft<=0){clearInterval(timerInterval);setTimeout(stopTimer,900);}
  },1000);
}

function updateTimer(){
  document.getElementById('timer-num').textContent=timerLeft;
  var fg=document.getElementById('ring-fg');
  fg.style.strokeDashoffset=534*(1-timerLeft/timerTotal);
  fg.style.stroke=timerLeft<=5?'#EF5350':timerLeft<=10?'#F9A825':'#9C4A87';
}

function stopTimer(){
  clearInterval(timerInterval);
  document.getElementById('timer-overlay').classList.remove('show');
}

buildTabs();
renderSession(SESSIONS[0]);
</script>
