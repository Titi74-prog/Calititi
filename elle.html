<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>Affinement Global — Programme</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FDF7FA;color:#2d1b29;overflow:hidden}
:root{
  --plum:#9C4A87;--plum2:#C76B98;--rose:#E8B4CB;--roseL:#FBEAF2;
  --gold:#E8A87C;--goldL:#FFF3EC;--mint:#7FCDBB;--mintL:#EEFAF7;
  --lav:#A29BFE;--lavL:#F2F0FF;
  --bg:#FDF7FA;--white:#fff;--txt:#2d1b29;--txt2:#6b5566;--txt3:#a0909b;
  --border:#f3e5ee;
}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg)}
#header{background:linear-gradient(135deg,#9C4A87 0%,#C76B98 50%,#E8A87C 100%);padding:16px;flex-shrink:0;position:relative;overflow:hidden}
#header::after{content:'🌸';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.45}
#header h1{font-size:16px;font-weight:700;color:#fff}
#header p{font-size:11px;color:rgba(255,255,255,.85);margin-top:3px}
#tabs{display:flex;background:#fff;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05)}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:0;padding:9px 4px;font-size:11px;font-weight:700;color:var(--txt3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;text-align:center;transition:color .2s;white-space:nowrap}
.tab .tab-sub{display:block;font-size:9px;font-weight:500;margin-top:2px;color:var(--txt3)}
.tab.active{color:var(--plum);border-bottom-color:var(--plum)}
.tab.active .tab-sub{color:var(--plum)}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom,0px)}
.session-header{padding:15px 16px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.session-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.session-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:3px}
.session-meta{font-size:11px;color:var(--txt2)}
.session-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--roseL);color:var(--plum);margin-right:4px}
.progress-wrap{padding:12px 16px 10px;background:#fff;border-bottom:1px solid var(--border)}
.progress-row{display:flex;justify-content:space-between;margin-bottom:7px}
.progress-lbl{font-size:12px;font-weight:600;color:var(--txt2)}
.progress-pct{font-size:13px;font-weight:700;color:var(--plum)}
.progress-track{background:var(--border);border-radius:8px;height:8px;overflow:hidden}
.progress-fill{height:8px;border-radius:8px;background:linear-gradient(90deg,#9C4A87,#E8A87C);transition:width .5s}
.why-box{margin:12px;background:var(--lavL);border-radius:14px;padding:12px 14px;font-size:12px;color:var(--txt);line-height:1.65;border:1px solid #e5e0ff}
.why-title{font-size:11px;font-weight:700;color:var(--lav);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.warm-section{padding:13px 16px;background:var(--mintL);border-bottom:1px solid #ddf2ec}
.warm-title{font-size:11px;font-weight:700;color:#4daa95;text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px}
.warm-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(127,205,187,.2)}
.warm-item:last-child{border:none}
.warm-item-txt{flex:1;font-size:13px;color:var(--txt);font-weight:500}
.warm-item-sub{font-size:11px;color:var(--txt3);font-weight:400}
.warm-badge{background:var(--mint);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.exo-list{padding:12px 12px 24px}
.exo-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(156,74,135,.05)}
.exo-card.open{border-color:var(--plum);box-shadow:0 4px 16px rgba(156,74,135,.15)}
.exo-card.done{opacity:.6}
.exo-card-header{display:flex;align-items:center;padding:13px 14px;gap:12px}
.exo-num{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:var(--roseL);color:var(--plum)}
.exo-num.is-done{background:linear-gradient(135deg,#7FCDBB,#A29BFE);color:#fff}
.exo-info{flex:1;min-width:0}
.exo-name{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:3px}
.badge-row{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.badge-s{background:var(--roseL);color:var(--plum)}
.badge-t{background:var(--mintL);color:#4daa95}
.exo-chevron{font-size:20px;color:var(--txt3);transition:transform .25s;line-height:1;flex-shrink:0}
.exo-card.open .exo-chevron{transform:rotate(180deg);color:var(--plum)}
.exo-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.exo-card.open .exo-detail{display:block}
.exo-detail-txt{font-size:13px;color:var(--txt2);line-height:1.65;margin-top:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700}
.chip-s{background:var(--roseL);color:var(--plum)}
.chip-r{background:var(--goldL);color:#c77f4a}
.chip-t{background:var(--mintL);color:#4daa95}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn-timer{margin-top:0;flex:1}
.btn-timer{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;border:none;font-size:13px;font-weight:700;padding:11px 10px;border-radius:12px;cursor:pointer;-webkit-appearance:none}
.btn-hold{background:linear-gradient(135deg,#7FCDBB,#4ECDC4);color:#fff}
.btn-rest{background:rgba(80,80,80,.08);color:#555;border:1.5px solid #e0d8e8}
.btn-done{display:flex;align-items:center;gap:8px;width:100%;background:#fff;border:1.5px solid var(--border);color:var(--txt2);font-size:13px;font-weight:600;padding:10px 16px;border-radius:12px;cursor:pointer;margin-top:8px;-webkit-appearance:none;justify-content:center;transition:all .2s}
.btn-done.is-done{border-color:var(--mint);color:#4daa95;background:var(--mintL)}
.conseil{margin:0 12px 80px;background:linear-gradient(135deg,#FFF3EC,#FBEAF2);border-radius:16px;padding:13px 14px;font-size:12px;color:var(--txt);line-height:1.7;border:1px solid #f5dfe9}
.conseil-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
#timer-overlay{display:none;position:fixed;inset:0;background:rgba(45,27,41,.93);z-index:100;align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(4px)}
#timer-overlay.show{display:flex}
#timer-label{font-size:14px;font-weight:700;color:var(--rose);margin-bottom:12px;text-align:center;padding:0 24px}
#timer-ring{position:relative;width:190px;height:190px;margin:8px 0}
#timer-ring svg{width:190px;height:190px;transform:rotate(-90deg)}
#timer-ring .ring-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:10}
#timer-ring .ring-fg{fill:none;stroke:#C76B98;stroke-width:10;stroke-linecap:round;stroke-dasharray:534;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear}
#timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:58px;font-weight:800;color:#fff;line-height:1}
#timer-sec{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px;margin-top:4px}
#btn-stop{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:#fff;font-size:15px;font-weight:600;padding:13px 36px;border-radius:16px;cursor:pointer;-webkit-appearance:none}
</style>
</head>

var currentTab=0,doneExos={},timerInterval=null,timerTotal=0,timerLeft=0;

function buildTabs(){
  var bar=document.getElementById('tabs');
  bar.innerHTML='';
  DAYS.forEach(function(d,i){
    var el=document.createElement('div');
    el.className='tab'+(i===0?' active':'');
    el.innerHTML=d.tab+'<span class="tab-sub">'+d.sub+'</span>';
    el.onclick=(function(idx){return function(){showTab(idx);};})(i);
    bar.appendChild(el);
  });
}

function showTab(i){
  currentTab=i;
  document.querySelectorAll('.tab').forEach(function(t,j){t.classList.toggle('active',j===i);});
  renderSession(SESSIONS[i]);
}

function renderSession(s){
  var content=document.getElementById('content');
  var dk=doneExos[s.id]||{};
  var doneCount=Object.keys(dk).length;
  var total=s.exos.length;
  var pct=total?Math.round(doneCount/total*100):0;

  var html='<div class="session-header">'
    +'<div class="session-icon" style="background:'+s.iconBg+'">'+s.icon+'</div>'
    +'<div><div class="session-title">'+s.name+' — '+s.sub+'</div>'
    +'<div class="session-meta"><span class="session-tag">'+s.tag+'</span>'+doneCount+'/'+total+' faits</div></div>'
    +'</div>';

  if(total>0){
    html+='<div class="progress-wrap">'
      +'<div class="progress-row"><span class="progress-lbl">Progression</span><span class="progress-pct">'+pct+'%</span></div>'
      +'<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
      +'</div>';
  }

  if(s.why){
    html+='<div class="why-box"><div class="why-title">&#x1F9EC; Pourquoi cette seance</div>'+s.why+'</div>';
  }

  if(s.warmup.length>0){
    html+='<div class="warm-section"><div class="warm-title">&#x1F525; Echauffement</div>';
    s.warmup.forEach(function(w){
      html+='<div class="warm-item">'
        +'<div class="warm-item-txt">'+w.n+'<br><span class="warm-item-sub">'+w.d+'</span></div>'
        +'<span class="warm-badge">'+w.b+'</span></div>';
    });
    html+='</div>';
  }

  html+='<div class="exo-list">';
  s.exos.forEach(function(ex,i){
    var done=dk[i];
    html+='<div class="exo-card'+(done?' done':'')
      +'" id="card-'+s.id+'-'+i+'" onclick="toggleCard(\''+s.id+'\','+i+')">'
      +'<div class="exo-card-header">'
      +'<div class="exo-num'+(done?' is-done':'')+'\">'+(done?'&#x2713;':(i+1))+'</div>'
      +'<div class="exo-info">'
      +'<div class="exo-name">'+ex.name+'</div>'
      +'<div class="badge-row">'
      +'<span class="badge badge-s">'+ex.sets+'</span>'
      +(ex.target?'<span class="badge badge-t">'+ex.target+'</span>':'')
      +'</div></div>'
      +'<span class="exo-chevron">&#x2304;</span></div>'
      +'<div class="exo-detail">'
      +'<div class="exo-detail-txt">'+ex.detail+'</div>'
      +'<div class="chips">'
      +'<span class="chip chip-s">'+ex.sets+'</span>'
      +'<span class="chip chip-r">'+ex.reps+'</span>'
      +(ex.rest>0?'<span class="chip chip-t">Repos '+ex.rest+'s</span>':'')
      +'</div>'
      +'<div class="btn-row">'
      +(ex.hold>0?'<button class="btn-timer btn-hold" onclick="event.stopPropagation();startTimer('+ex.hold+',\'&#x1F3CB; Exercice\')">&#x1F3CB; Exercice '+ex.hold+'s</button>':'')
      +(ex.rest>0?'<button class="btn-timer btn-rest" onclick="event.stopPropagation();startTimer('+ex.rest+',\'&#x23F1; Repos\')">&#x23F1; Repos '+ex.rest+'s</button>':'')
      +'</div>'
      +'<button class="btn-done'+(done?' is-done':'')
      +'" onclick="event.stopPropagation();markDone(\''+s.id+'\','+i+')">'
      +(done?'&#x21A9; Marquer non fait':'&#x2713; Exercice termine')
      +'</button>'
      +'</div></div>';
  });
  html+='</div>';

  if(s.conseil){
    html+='<div class="conseil"><div class="conseil-title">&#x1F4A1; Conseil</div>'+s.conseil+'</div>';
  }

  content.innerHTML=html;
  content.scrollTop=0;
}

function toggleCard(sid,i){
  var card=document.getElementById('card-'+sid+'-'+i);
  var isOpen=card.classList.contains('open');
  document.querySelectorAll('.exo-card.open').forEach(function(c){c.classList.remove('open');});
  if(!isOpen)card.classList.add('open');
}

function markDone(sid,i){
  if(!doneExos[sid])doneExos[sid]={};
  if(doneExos[sid][i])delete doneExos[sid][i];
  else doneExos[sid][i]=true;
  var scrollY=document.getElementById('content').scrollTop;
  renderSession(SESSIONS[currentTab]);
  document.getElementById('content').scrollTop=scrollY;
  var card=document.getElementById('card-'+sid+'-'+i);
  if(card)card.classList.add('open');
}

function startTimer(sec,label){
  timerTotal=sec;timerLeft=sec;
  document.getElementById('timer-label').textContent=label||'Repos';
  document.getElementById('timer-overlay').classList.add('show');
  updateTimer();
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    timerLeft--;updateTimer();
    if(timerLeft<=0){clearInterval(timerInterval);setTimeout(stopTimer,900);}
  },1000);
}

function updateTimer(){
  document.getElementById('timer-num').textContent=timerLeft;
  var fg=document.getElementById('ring-fg');
  fg.style.strokeDashoffset=534*(1-timerLeft/timerTotal);
  fg.style.stroke=timerLeft<=5?'#E84A5F':timerLeft<=10?'#E8A87C':'#C76B98';
}

function stopTimer(){
  clearInterval(timerInterval);
  document.getElementById('timer-overlay').classList.remove('show');
}

buildTabs();
renderSession(SESSIONS[0]);
</script>
</body>
</html>
